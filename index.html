<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Deportivo Moscu — Игроки</title>

  <style>
    :root {
      --green: #008c35;
      --green-dark: #003b16;
      --green-deep: #00270e;
      --black: #050505;
      --gray: #67726a;
      --light: #f5f7f5;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 125px;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--light);
      color: var(--black);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: 104px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6vw;
      background: rgba(255, 255, 255, 0.97);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .brand-logo {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .brand-logo img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .brand-title {
      color: var(--green);
      font-size: 31px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      margin-top: 12px;
      color: var(--green);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.48em;
      text-transform: uppercase;
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: 54px;
      font-size: 16px;
      font-weight: 950;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .main-nav a {
      transition: 0.2s ease;
    }

    .main-nav a:hover,
    .main-nav a.active {
      color: var(--green);
    }

    .players-section {
      min-height: calc(100vh - 104px);
      padding: 72px 6vw 110px;
      background: #f5f7f5;
      scroll-margin-top: 125px;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
      margin-bottom: 42px;
    }

    .section-kicker {
      margin-bottom: 14px;
      color: var(--green);
      font-size: 14px;
      font-weight: 950;
      letter-spacing: 0.38em;
      text-transform: uppercase;
    }

    .section-title {
      color: var(--green-dark);
      font-size: clamp(48px, 6vw, 86px);
      line-height: 0.95;
      font-weight: 950;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .section-text {
      max-width: 650px;
      color: #5f6862;
      font-size: 20px;
      line-height: 1.55;
      font-weight: 800;
    }

    .players-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 36px;
    }

    .players-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .filter-btn {
      height: 52px;
      padding: 0 28px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      background: #ffffff;
      color: #050505;
      font-size: 16px;
      font-weight: 950;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .filter-btn:hover {
      border-color: rgba(0, 140, 53, 0.4);
      color: var(--green);
    }

    .filter-btn.is-active {
      border-color: #050505;
      background: #050505;
      color: #ffffff;
    }

    .players-count {
      min-height: 52px;
      padding: 0 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 140, 53, 0.09);
      color: var(--green);
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(230px, 1fr));
      gap: 34px;
      align-items: stretch;
    }

    .player-card {
      position: relative;
      overflow: hidden;
      min-height: 520px;
      border-radius: 0 38px 18px 18px;
      background: #ffffff;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    .player-number {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 5;
      width: 88px;
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom-right-radius: 28px;
      background: #ffffff;
      color: var(--green);
      font-size: 30px;
      font-weight: 950;
    }

    .player-photo {
      position: relative;
      height: 300px;
      overflow: hidden;
      background: radial-gradient(circle at center, #00551f 0%, #003b16 60%, #00250d 100%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .player-real-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .player-placeholder {
      position: relative;
      width: 230px;
      height: 250px;
    }

    .player-placeholder::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 98px;
      height: 98px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #c4a07b;
    }

    .player-placeholder::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 210px;
      height: 165px;
      transform: translateX(-50%);
      border-radius: 110px 110px 0 0;
      background: linear-gradient(180deg, #d7d7d7 0%, #111111 45%, #050505 100%);
    }

    .player-info {
      padding: 32px 32px 28px;
      background: #ffffff;
    }

    .player-position {
      margin-bottom: 18px;
      color: var(--green);
      font-size: 15px;
      font-weight: 950;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .player-name {
      min-height: 72px;
      margin-bottom: 24px;
      color: #050505;
      font-size: 27px;
      line-height: 1.08;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      word-break: break-word;
    }

    .player-country {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 34px;
      margin-bottom: 28px;
      color: #67726a;
      font-size: 17px;
      font-weight: 800;
    }

    .player-flag {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 28px;
      flex: 0 0 44px;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
      background: #eeeeee;
    }

    .player-btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 999px;
      background: var(--green);
      color: #ffffff;
      font-size: 17px;
      font-weight: 950;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .player-btn:hover {
      background: #006e29;
      transform: translateY(-2px);
    }

    .site-footer {
      padding: 38px 6vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      background: var(--green-dark);
      color: #ffffff;
      font-weight: 850;
    }

    .site-footer span {
      color: rgba(255, 255, 255, 0.72);
    }

    @media (max-width: 1280px) {
      .players-grid {
        grid-template-columns: repeat(3, minmax(230px, 1fr));
      }

      .main-nav {
        gap: 32px;
      }
    }

    @media (max-width: 980px) {
      .site-header {
        height: auto;
        min-height: 104px;
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
        padding-top: 18px;
        padding-bottom: 18px;
      }

      .main-nav {
        width: 100%;
        justify-content: space-between;
        gap: 16px;
        overflow-x: auto;
        font-size: 13px;
      }

      .section-head,
      .players-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .players-grid {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
    }

    @media (max-width: 620px) {
      html {
        scroll-padding-top: 160px;
      }

      .site-header {
        padding-left: 20px;
        padding-right: 20px;
      }

      .brand-logo,
      .brand-logo img {
        width: 58px;
        height: 58px;
      }

      .brand-title {
        font-size: 20px;
        letter-spacing: 0.14em;
      }

      .brand-subtitle {
        font-size: 10px;
        letter-spacing: 0.32em;
      }

      .players-section {
        padding-left: 20px;
        padding-right: 20px;
      }

      .players-grid {
        grid-template-columns: 1fr;
      }

      .player-card {
        min-height: 500px;
      }

      .player-name {
        font-size: 25px;
      }

      .site-footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <a href="index.html" class="brand">
      <div class="brand-logo">
        <img src="logo.png.png" alt="Deportivo Moscu" onerror="this.style.display='none';">
      </div>

      <div>
        <div class="brand-title">Deportivo Moscu</div>
        <div class="brand-subtitle">Football Club</div>
      </div>
    </a>

    <nav class="main-nav">
      <a href="club.html">Клуб</a>
      <a href="index.html#players">Игроки</a>
      <a href="matches.html">Матчи</a>
      <a href="news.html">Новости</a>
    </nav>
  </header>

  <main>
    <section class="players-section" id="players">
      <div class="section-head">
        <div>
          <div class="section-kicker">Команда</div>
          <h1 class="section-title">Игроки</h1>
        </div>

        <p class="section-text">
          Полный состав Deportivo Moscu. Карточки автоматически берут данные из файла players-data.js.
        </p>
      </div>

      <div class="players-toolbar">
        <div class="players-filters">
          <button class="filter-btn is-active" type="button" data-role-filter="all">Все</button>
          <button class="filter-btn" type="button" data-role-filter="goalkeeper">Вратари</button>
          <button class="filter-btn" type="button" data-role-filter="defender">Защитники</button>
          <button class="filter-btn" type="button" data-role-filter="midfielder">Полузащитники</button>
          <button class="filter-btn" type="button" data-role-filter="forward">Нападающие</button>
        </div>

        <div class="players-count" id="playersCount">0 игроков</div>
      </div>

      <div class="players-grid" id="playersGrid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <strong>Deportivo Moscu Football Club</strong>
    <span>© 2026</span>
  </footer>

  <script src="league-data.js"></script>
  <script src="matches-data.js"></script>
  <script src="news-data.js"></script>
  <script src="players-data.js"></script>
  <script src="nav-links.js"></script>
  <script src="app.js"></script>
</body>
</html>
