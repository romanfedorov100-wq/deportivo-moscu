<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Deportivo Moscu — Матчи</title>

  <style>
    :root {
      --green: #008c35;
      --green-dark: #003b16;
      --black: #050505;
      --gray: #64706a;
      --light: #f5f7f5;
      --white: #ffffff;
      --line: rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--light);
      color: var(--black);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: 104px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6vw;
      background: rgba(255, 255, 255, 0.97);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .brand-logo {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .brand-logo img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .brand-title {
      color: var(--green);
      font-size: 31px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      margin-top: 12px;
      color: var(--green);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.48em;
      text-transform: uppercase;
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: 54px;
      font-size: 16px;
      font-weight: 950;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .main-nav a:hover,
    .main-nav a.active {
      color: var(--green);
    }

    .page {
      padding: 72px 6vw 100px;
    }

    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
      margin-bottom: 42px;
    }

    .section-kicker {
      margin-bottom: 14px;
      color: var(--green);
      font-size: 14px;
      font-weight: 950;
      letter-spacing: 0.38em;
      text-transform: uppercase;
    }

    .page-title {
      color: var(--green-dark);
      font-size: clamp(48px, 6vw, 86px);
      line-height: 0.95;
      font-weight: 950;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .page-text {
      max-width: 650px;
      color: var(--gray);
      font-size: 20px;
      line-height: 1.55;
      font-weight: 800;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 38px;
    }

    .summary-card {
      min-height: 130px;
      padding: 24px;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.06);
    }

    .summary-card span {
      display: block;
      margin-bottom: 12px;
      color: var(--gray);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .summary-card strong {
      color: var(--green-dark);
      font-size: 34px;
      font-weight: 950;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 34px;
      align-items: start;
    }

    .panel {
      overflow: hidden;
      border-radius: 28px;
      background: #ffffff;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.07);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 26px 28px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      color: var(--green-dark);
      font-size: 25px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-note {
      color: var(--gray);
      font-size: 14px;
      font-weight: 800;
    }

    .standings-table {
      width: 100%;
      border-collapse: collapse;
    }

    .standings-table th {
      padding: 14px 10px;
      background: #f2f6f3;
      color: var(--gray);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      text-align: center;
    }

    .standings-table th.team-cell,
    .standings-table td.team-cell {
      text-align: left;
    }

    .standings-table td {
      padding: 14px 10px;
      border-top: 1px solid var(--line);
      color: #1b211d;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
    }

    .standings-table tr.is-deportivo td {
      background: rgba(0, 140, 53, 0.09);
      color: var(--green-dark);
      font-weight: 950;
    }

    .team-logo {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: contain;
      background: #f4f7f5;
      flex: 0 0 34px;
    }

    .team-mini {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .team-fallback {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e7f2eb;
      color: var(--green);
      font-size: 12px;
      font-weight: 950;
      flex: 0 0 34px;
    }

    .matches-list {
      display: grid;
      gap: 16px;
      padding: 24px;
    }

    .match-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      background: #ffffff;
    }

    .match-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      background: #f5f7f5;
      color: var(--gray);
      font-size: 13px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .match-status {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(0, 140, 53, 0.09);
      color: var(--green);
      white-space: nowrap;
    }

    .match-status.upcoming {
      background: rgba(0, 0, 0, 0.08);
      color: #111111;
    }

    .match-body {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
      padding: 22px 18px;
    }

    .match-team {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      font-size: 17px;
      font-weight: 950;
    }

    .match-team.away {
      justify-content: flex-end;
      text-align: right;
    }

    .match-score {
      min-width: 86px;
      height: 56px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--green-dark);
      color: #ffffff;
      font-size: 26px;
      font-weight: 950;
    }

    .match-note {
      padding: 0 18px 18px;
      color: var(--gray);
      font-size: 14px;
      font-weight: 750;
      line-height: 1.45;
    }

    .site-footer {
      padding: 38px 6vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      background: var(--green-dark);
      color: #ffffff;
      font-weight: 850;
    }

    .site-footer span {
      color: rgba(255, 255, 255, 0.72);
    }

    @media (max-width: 1180px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(180px, 1fr));
      }
    }

    @media (max-width: 760px) {
      .site-header {
        height: auto;
        min-height: 104px;
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
        padding: 18px 20px;
      }

      .main-nav {
        width: 100%;
        justify-content: flex-start;
        gap: 20px;
        overflow-x: auto;
        font-size: 13px;
      }

      .brand-logo,
      .brand-logo img {
        width: 58px;
        height: 58px;
      }

      .brand-title {
        font-size: 20px;
        letter-spacing: 0.14em;
      }

      .brand-subtitle {
        font-size: 10px;
        letter-spacing: 0.32em;
      }

      .page {
        padding-left: 20px;
        padding-right: 20px;
      }

      .page-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .match-body {
        grid-template-columns: 1fr;
      }

      .match-team.away {
        justify-content: flex-start;
        text-align: left;
      }

      .standings-table {
        min-width: 760px;
      }

      .table-scroll {
        overflow-x: auto;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <a href="index.html" class="brand">
      <div class="brand-logo">
        <img src="logo.png.png" alt="Deportivo Moscu" onerror="this.style.display='none';">
      </div>

      <div>
        <div class="brand-title">Deportivo Moscu</div>
        <div class="brand-subtitle">Football Club</div>
      </div>
    </a>

    <nav class="main-nav">
      <a href="club.html">Клуб</a>
      <a href="index.html#players">Игроки</a>
      <a class="active" href="matches.html">Матчи</a>
      <a href="news.html">Новости</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-head">
      <div>
        <div class="section-kicker">Liga Escobarense</div>
        <h1 class="page-title">Матчи</h1>
      </div>

      <p class="page-text">
        Таблица Primera División B 2025-26 / Zona Escobar и все матчи Deportivo Moscu:
        сыгранные и будущие.
      </p>
    </section>

    <section class="summary-grid" id="summaryGrid"></section>

    <section class="content-grid">
      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">Таблица</h2>
          <div class="panel-note" id="leagueUpdated"></div>
        </div>

        <div class="table-scroll">
          <table class="standings-table">
            <thead>
              <tr>
                <th>#</th>
                <th class="team-cell">Команда</th>
                <th>PJ</th>
                <th>G</th>
                <th>E</th>
                <th>P</th>
                <th>GF</th>
                <th>GC</th>
                <th>DIF</th>
                <th>PTS</th>
              </tr>
            </thead>
            <tbody id="standingsBody"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">Игры Deportivo</h2>
          <div class="panel-note">26 туров</div>
        </div>

        <div class="matches-list" id="matchesList"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <strong>Deportivo Moscu Football Club</strong>
    <span>© 2026</span>
  </footer>

  <script src="matches-data.js"></script>

  <script>
    function isDeportivo(team) {
      return String(team || "").toLowerCase().includes("deportivo moscu");
    }

    function teamLogo(team) {
      if (isDeportivo(team)) {
        return '<img class="team-logo" src="logo.png.png" alt="Deportivo Moscu" onerror="this.outerHTML=teamFallback(\\'DM\\')">';
      }

      const initials = String(team || "")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(function (word) { return word[0]; })
        .join("")
        .toUpperCase();

      return teamFallback(initials || "FC");
    }

    function teamFallback(text) {
      return '<span class="team-fallback">' + text + '</span>';
    }

    function renderSummary() {
      const root = document.getElementById("summaryGrid");
      const league = window.deportivoLeague;
      const row = league.standings.find(function (item) {
        return isDeportivo(item.team);
      });

      const played = league.matches.filter(function (match) {
        return match.status === "played";
      }).length;

      const upcoming = league.matches.filter(function (match) {
        return match.status === "upcoming";
      }).length;

      root.innerHTML = `
        <article class="summary-card">
          <span>Место</span>
          <strong>${row.position}</strong>
        </article>

        <article class="summary-card">
          <span>Очки</span>
          <strong>${row.pts}</strong>
        </article>

        <article class="summary-card">
          <span>Сыграно</span>
          <strong>${played}</strong>
        </article>

        <article class="summary-card">
          <span>Будущие</span>
          <strong>${upcoming}</strong>
        </article>
      `;

      document.getElementById("leagueUpdated").textContent = "Обновлено: " + league.updated;
    }

    function renderStandings() {
      const body = document.getElementById("standingsBody");
      const standings = window.deportivoLeague.standings;

      body.innerHTML = standings.map(function (row) {
        return `
          <tr class="${isDeportivo(row.team) ? "is-deportivo" : ""}">
            <td>${row.position}</td>
            <td class="team-cell">
              <div class="team-mini">
                ${teamLogo(row.team)}
                <strong>${row.team}</strong>
              </div>
            </td>
            <td>${row.pj}</td>
            <td>${row.g}</td>
            <td>${row.e}</td>
            <td>${row.p}</td>
            <td>${row.gf}</td>
            <td>${row.gc}</td>
            <td>${row.dif}</td>
            <td>${row.pts}</td>
          </tr>
        `;
      }).join("");
    }

    function renderMatches() {
      const root = document.getElementById("matchesList");
      const matches = window.deportivoLeague.matches;

      root.innerHTML = matches.map(function (match) {
        const score = match.status === "played"
          ? match.homeScore + " : " + match.awayScore
          : "— : —";

        const statusText = match.status === "played" ? "Сыгран" : "Будущий матч";

        return `
          <article class="match-card">
            <div class="match-top">
              <span>Fecha ${match.round} · ${match.date}</span>
              <span class="match-status ${match.status === "upcoming" ? "upcoming" : ""}">${statusText}</span>
            </div>

            <div class="match-body">
              <div class="match-team">
                ${teamLogo(match.home)}
                <span>${match.home}</span>
              </div>

              <div class="match-score">${score}</div>

              <div class="match-team away">
                <span>${match.away}</span>
                ${teamLogo(match.away)}
              </div>
            </div>

            ${match.note ? '<div class="match-note">' + match.note + '</div>' : ''}
          </article>
        `;
      }).join("");
    }

    document.addEventListener("DOMContentLoaded", function () {
      renderSummary();
      renderStandings();
      renderMatches();
    });
  </script>
</body>
</html>
